<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plato School | Global Pre-Med Strategic Hub</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        /* (기존 스타일 유지) */
        :root { --navy: #0a1628; --blue: #1a56db; --gold: #c9a84c; --white: #f8f9ff; --gray: #8892a0; }
        body { font-family: sans-serif; background: var(--white); margin: 0; }
        nav { position: fixed; top: 0; width: 100%; height: 70px; background: var(--navy); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 1000; color: white; }
        .lang-btn { background: transparent; border: 1px solid white; color: white; padding: 5px 10px; cursor: pointer; margin-left: 5px; border-radius: 4px; }
        .lang-btn.active { background: var(--gold); border-color: var(--gold); color: var(--navy); }
        section { padding: 100px 20px; max-width: 1200px; margin: 0 auto; }
        .section-title { font-size: 2rem; margin-bottom: 30px; text-align: center; }
        /* FAQ Style */
        .faq-item { background: white; border: 1px solid #ddd; margin-bottom: 10px; border-radius: 8px; overflow: hidden; }
        .faq-q { padding: 20px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .faq-a { padding: 0 20px 20px; color: #666; display: none; border-top: 1px solid #eee; padding-top: 15px; }
        .faq-item.open .faq-a { display: block; }
    </style>
</head>
<body>

<nav>
    <div class="logo">Plato School</div>
    <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLang('ko',this)">KR</button>
        <button class="lang-btn" onclick="setLang('en',this)">EN</button>
        <button class="lang-btn" onclick="setLang('zh',this)">ZH</button>
        <button class="lang-btn" onclick="setLang('ja',this)">JP</button>
        <button class="lang-btn" onclick="setLang('th',this)">TH</button>
        <button class="lang-btn" onclick="setLang('vi',this)">VN</button>
        <button class="lang-btn" onclick="setLang('id',this)">ID</button>
    </div>
</nav>

<section id="faq-section">
    <h2 class="section-title" id="faq-title">자주 묻는 질문</h2>
    <div id="faq-container">
        </div>
</section>

<script>
const dict = {
    ko: {
        faqTitle: "자주 묻는 질문",
        faqs: [
            {q: "미국 의대 진학이 정말 가능한가요?", a: "네, 플라토 스쿨은 미국 비영리 재단 커리큘럼을 통해 미국 의대 진학에 최적화된 Pre-Med 과정을 제공합니다."},
            {q: "서울 캠퍼스에서는 무엇을 하나요?", a: "임상 실습(Shadowing), MCAT 준비, 그리고 미국 현지 교수진의 화상 강의 및 대면 상담이 진행됩니다."},
            {q: "학위는 어디서 나오나요?", a: "샌프란시스코에 위치한 플라토 재단 본교의 학위가 수여됩니다."}
        ]
    },
    en: {
        faqTitle: "Frequently Asked Questions",
        faqs: [
            {q: "Is admission to US medical schools really possible?", a: "Yes, our Pre-Med curriculum is specifically designed to meet the requirements of US medical schools."},
            {q: "What happens at the Seoul campus?", a: "Clinical shadowing, MCAT prep, and hybrid lectures with US professors are conducted."},
            {q: "Where is the degree from?", a: "The degree is issued by the Plato Foundation HQ in San Francisco."}
        ]
    },
    zh: {
        faqTitle: "常见问题",
        faqs: [
            {q: "真的能进入美国医学院吗？", a: "是的，通过旧金山非营利基金会的课程，提供最适合美国医学院进修的医学预科课程。"},
            {q: "在首尔校区做什么？", a: "进行临床实习、MCAT准备以及美国教授的视频课程。"}
        ]
    },
    ja: {
        faqTitle: "よくある質問",
        faqs: [
            {q: "アメリカの医学部進学は本当に可能ですか？", a: "はい、SF非営利財団のカリキュラムを通じて、最適なPre-Medコースを提供します。"},
            {q: "ソウルキャンパスでは何をしますか？", a: "臨床実習、MCAT準備、オンライン講義などが行われます。"}
        ]
    },
    th: {
        faqTitle: "คำถามที่พบบ่อย",
        faqs: [
            {q: "สามารถเข้าโรงเรียนแพทย์ในสหรัฐฯ ได้จริงหรือ?", a: "ใช่ หลักสูตรของเราออกแบบมาเพื่อการเข้าเรียนต่อโรงเรียนแพทย์ในสหรัฐฯ โดยเฉพาะ"},
            {q: "วิทยาเขตโซลทำอะไรบ้าง?", a: "มีการฝึกงานในโรงพยาบาล, เตรียมสอบ MCAT และเรียนผ่านระบบวิดีโอคอนเฟอเรนซ์"}
        ]
    },
    vi: {
        faqTitle: "Câu hỏi thường gặp",
        faqs: [
            {q: "Có thực sự vào được trường y Mỹ không?", a: "Có, chương trình Pre-Med của chúng tôi được tối ưu hóa cho việc nhập học trường y tại Mỹ."},
            {q: "Campus Seoul có các hoạt động gì?", a: "Thực tập lâm sàng, luyện thi MCAT và học trực tuyến với giáo sư Mỹ."}
        ]
    },
    id: {
        faqTitle: "Pertanyaan Populer",
        faqs: [
            {q: "Apakah benar-benar bisa masuk sekolah kedokteran AS?", a: "Ya, kurikulum kami dirancang khusus untuk memenuhi standar masuk sekolah kedokteran di Amerika Serikat."},
            {q: "Apa yang dilakukan di kampus Seoul?", a: "Praktik klinis, persiapan MCAT, dan kuliah hibrida dengan profesor AS."}
        ]
    }
};

function renderFaq(lang) {
    const container = document.getElementById('faq-container');
    const data = dict[lang] || dict['en'];
    
    if (data.faqs) {
        container.innerHTML = data.faqs.map((f, i) => `
            <div class="faq-item" id="faq-${i}">
                <div class="faq-q" onclick="toggleFaq(${i})">
                    <span>${f.q}</span>
                    <i class="fas fa-plus"></i>
                </div>
                <div class="faq-a">${f.a}</div>
            </div>
        `).join('');
    }
}

function toggleFaq(i) {
    const item = document.getElementById('faq-' + i);
    item.classList.toggle('open');
}

function setLang(lang, btn) {
    // 버튼 활성화 클래스 처리
    if (btn) {
        document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    const t = dict[lang] || dict['en'];
    
    // 제목 변경
    const titleEl = document.getElementById('faq-title');
    if (titleEl) titleEl.innerText = t.faqTitle;

    // FAQ 리스트 새로 그리기 (중요!)
    renderFaq(lang);
    
    document.documentElement.lang = lang;
}

// 초기 로드 시 한국어로 설정
window.onload = () => {
    setLang('ko');
};
</script>

</body>
</html>
